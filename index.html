<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Grobot Animator: An interactive platform for animating robot eyes
    </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content">
      <div class="slider_container">
        <div class="slider_values">
          <label
            >Look X:
            <input type="range" id="lookX" min="-40" max="40" value="0"
          /></label>
          <label
            >Look Y:
            <input type="range" id="lookY" min="-60" max="60" value="0"
          /></label>
          <label
            >top eyelid :
            <input type="range" id="topH" min="0" max="50" value="0"
          /></label>
          <label
            >bottom eyelid:
            <input type="range" id="botH" min="0" max="50" value="0"
          /></label>
          <label
            >Tilt: <input type="range" id="tilt" min="-60" max="60" value="0"
          /></label>
          <label
            >eye Radius:
            <input type="range" id="eR" min="0" max="50" value="45"
          /></label>
          <label
            >pupil radius:
            <input type="range" id="pR" min="0" max="60" value="30"
          /></label>
        </div>
      </div>
      <div class="canvas_container">
        <canvas
          class="grobot_eyes shadow"
          width="320"
          height="240"
          id="canvas"
        ></canvas>

        <div class="export-zone">
          <div class="eye-selector">
            <label
              ><input type="radio" name="eyeSide" value="both" checked /> Both
              Eyes</label
            >
            <label
              ><input type="radio" name="eyeSide" value="left" /> Left
              Only</label
            >
            <label
              ><input type="radio" name="eyeSide" value="right" /> Right
              Only</label
            >
          </div>

          <textarea
          id="codeOutput"
          rows="5"
          style="width: 500px; margin-top: 10px; font-family: monospace"
          ></textarea>
          <button>Generate C++ Code</button>
          <br />
        </div>
      </div>
    </div>
    <!--  script file  -->
    <script src="app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
